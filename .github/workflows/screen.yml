name: Stock Screen

# Run this manually from the GitHub UI (Actions -> "Stock Screen" -> "Run workflow").
# The inputs below are the "boxes" you fill in on the web before running.
on:
  workflow_dispatch:
    inputs:
      preset:
        description: "Watchlist preset (ignored if 'tickers' is filled in)"
        type: choice
        default: wse
        options:
          - wse
          - us100
          - all
          - current_portfolio
          - current_pl
      tickers:
        description: "Your own portfolio / custom list (tickers only). If filled, this overrides the preset. Separate with spaces, commas or new lines, e.g. 'PKO.WA, KRU.WA, NVDA'"
        type: string
        default: ""
      horizon:
        description: "Investing horizon (re-weights the scoring pillars)"
        type: choice
        default: medium
        options:
          - short
          - medium
          - long
      top:
        description: "Keep only the top N screened names (0 = all)"
        type: number
        default: 15
      min_score:
        description: "Drop screened names below this score"
        type: number
        default: 0
      budget:
        description: "Cash budget to allocate across the shortlist (0 = skip allocation)"
        type: number
        default: 0
      alloc_top:
        description: "Allocate across the top N names (only used when budget > 0)"
        type: number
        default: 8
      max_weight:
        description: "Max weight per name for allocation, 0-1 (only used when budget > 0)"
        type: string
        default: "0.35"

run-name: "Screen ${{ inputs.tickers != '' && inputs.tickers || inputs.preset }} (${{ inputs.horizon }})"

permissions:
  contents: read

jobs:
  screen:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run screener
        env:
          PRESET: ${{ inputs.preset }}
          TICKERS: ${{ inputs.tickers }}
          HORIZON: ${{ inputs.horizon }}
          TOP: ${{ inputs.top }}
          MIN_SCORE: ${{ inputs.min_score }}
        run: |
          set -euo pipefail
          ARGS=(--horizon "$HORIZON" --top "$TOP" --min-score "$MIN_SCORE")
          # Normalize the user's own portfolio input: allow commas, semicolons,
          # tabs and new lines as separators, not just spaces.
          TICKERS_NORM="$(printf '%s' "$TICKERS" | tr ',;\t\r\n' ' ')"
          if [ -n "$(printf '%s' "$TICKERS_NORM" | tr -d ' ')" ]; then
            echo "Screening your own portfolio: $TICKERS_NORM"
            # word-split the ticker list into individual positional args
            # shellcheck disable=SC2206
            ARGS+=($TICKERS_NORM)
          else
            echo "Screening preset: $PRESET"
            ARGS+=(--preset "$PRESET")
          fi
          echo "screen_candidates.py ${ARGS[*]}"
          python scripts/screen_candidates.py "${ARGS[@]}" > screen.json
          cat screen.json

      - name: Allocate budget
        if: ${{ inputs.budget > 0 }}
        env:
          BUDGET: ${{ inputs.budget }}
          ALLOC_TOP: ${{ inputs.alloc_top }}
          MAX_WEIGHT: ${{ inputs.max_weight }}
        run: |
          set -euo pipefail
          python scripts/portfolio_allocator.py \
            --budget "$BUDGET" \
            --candidates-file screen.json \
            --top "$ALLOC_TOP" \
            --max-weight "$MAX_WEIGHT" > alloc.json
          cat alloc.json

      - name: Build dashboard
        env:
          TOP: ${{ inputs.top }}
        run: |
          set -euo pipefail
          mkdir -p output
          if [ -f alloc.json ]; then
            python scripts/view_results.py --screen-file screen.json --allocation-file alloc.json --top "$TOP" --out-md output/dashboard.md
          else
            python scripts/view_results.py --screen-file screen.json --top "$TOP" --out-md output/dashboard.md
          fi

      - name: Publish dashboard to run summary
        if: always()
        run: |
          if [ -f output/dashboard.md ]; then
            cat output/dashboard.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No dashboard was produced." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload result files
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: screen-results
          path: |
            screen.json
            alloc.json
            output/dashboard.md
          if-no-files-found: warn
